name: tck-servlet
on:
  schedule:
  - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      httpImplementation:
        description: 'HTTP Implementation'
        default: 'impl'
        required: true
jobs:
  expression:
    if: github.repository == 'piranhacloud/piranha'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [ '21' ]
        os: [ubuntu-latest]
    steps:
    - name: Checkout Sources
      uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Setup for TCK
      run: mvn -B -DskipTests=true install
    - name: Run TCK
      run: mvn -amd -B -P external -pl external/servlet-tck/expression verify
  pages:
    if: github.repository == 'piranhacloud/piranha'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [ '21' ]
        os: [ubuntu-latest]
    steps:
    - name: Checkout sources
      uses: actions/checkout@v4
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Setup for TCK
      run: mvn -B -DskipTests=true install
    - name: Run TCK
      run: mvn -amd -B -P external -pl external/servlet-tck/pages verify
  servlet:
    if: github.repository == 'piranhacloud/piranha'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [ '21' ]
        os: [ubuntu-latest]
    steps:
    - name: Checkout sources
      uses: actions/checkout@v4
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Setup for TCK
      run: mvn -B -DskipTests=true install -P${{ github.event.inputs.httpImplementation }}
      if: ${{ github.event.inputs.httpImplementation }}
    - name: Setup for TCK
      run: mvn -B -DskipTests=true install
      if: ${{ !github.event.inputs.httpImplementation }}
    - name: Run TCK
      run: |
        mvn -amd -B -P external -pl external/tck-servlet/servlet verify
        cat external/tck-servlet/target/piranha/report/text/summary.txt >> $GITHUB_STEP_SUMMARY