name: pr
on: 
  pull_request:
    branches:
      - '*'
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        java: [ 21, 23 ]
        os: [ubuntu-latest, windows-latest]
    steps:
    - name: Checkout Sources
      uses: actions/checkout@v4
    - name: Setup Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Build with Maven
      run: mvn -B -ntp -T 1 install
  codeql:
    name: codeql
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Checkout sources
      uses: actions/checkout@v4
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'java'
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Build with Maven
      run: mvn -B -DskipTests=true -DskipITs=true --ntp install
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
  docs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Piranha
      uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 21
    - name: Build with Maven
      run: |
        cd docs
        mvn -B -DskipTests -DskipITs -ntp -P docs site
  maven-plugin:
    needs: docs
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Piranha
      uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 21
    - name: Build with Maven
      run: |
        mvn -B -DskipTests -DskipITs -ntp install
        cd maven/plugin
        mvn -B -DskipTests -DskipITs -ntp site
