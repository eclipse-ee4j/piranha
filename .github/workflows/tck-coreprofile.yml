name: tck-coreprofile
on: 
  schedule:
  - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  cdi:
    if: github.repository == 'piranhacloud/piranha'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [ '21' ]
        os: [ubuntu-latest]
    steps:
    - name: Checkout Sources
      uses: actions/checkout@v4
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Setup for TCK
      run: mvn -B -DskipTests=true -ntp install
    - name: Run TCK
      run: |
        cd external/tck/cdi
        mvn -B -ntp -T 1 verify
    - name: Test Summary
      uses: test-summary/action@v2
      with:
        paths: |
          external/tck/cdi/runner/core/target/surefire-reports/junitreports/TEST-*.xml
          external/tck/cdi/runner/model/target/surefire-reports/TEST-*.xml
      if: always()
  coreprofile:
    if: github.repository == 'piranhacloud/piranha'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [ '21' ]
        os: [ubuntu-latest]
    steps:
    - name: Checkout Sources
      uses: actions/checkout@v4
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Setup for TCK
      run: mvn -B -DskipTests=true -ntp install
    - name: Run TCK
      run: |
        cd external/tck/coreprofile
        mvn -B -Dmaven.test.failure.ignore=true -ntp verify        
    - name: Test Summary
      uses: test-summary/action@v2
      with:
        paths: "external/tck/coreprofile/runner/target/failsafe-reports/**/TEST-*.xml"
      if: always()
  jsonp:
    if: github.repository == 'piranhacloud/piranha'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [ '21' ]
        os: [ubuntu-latest]
    steps:
    - name: Checkout Sources
      uses: actions/checkout@v4
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Setup for TCK
      run: mvn -B -DskipTests=true -ntp install
    - name: Run TCK
      run: |
        cd external/coreprofile-tck/jsonp
        mvn -B -ntp verify
    - name: Test Summary
      uses: test-summary/action@v2
      with:
        paths: |
          external/coreprofile-tck/jsonp/installer/target/tck/bin/tck-tests/target/surefire-reports/TEST-*.xml
          external/coreprofile-tck/jsonp/installer/target/tck/bin/tck-tests-pluggability/target/surefire-reports/TEST-*.xml
      if: always()
  rest:
    if: github.repository == 'piranhacloud/piranha'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        java: [ '21' ]
        os: [ubuntu-latest]
    steps:
    - name: Checkout Sources
      uses: actions/checkout@v4
    - name: Set up Java ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ matrix.java }}
    - name: Setup for TCK
      run: mvn -B -DskipTests=true -ntp install
    - name: Run TCK
      run: |
        cd external/coreprofile-tck/rest
        mvn -B -ntp -T 1 verify        
    - name: Test Summary
      uses: test-summary/action@v2
      id: test_summary
      with:
        paths: "external/coreprofile-tck/rest/runner/target/failsafe-reports/**/TEST-*.xml"
        output: test-summary.md
      if: always()
    - name: Job Summary
      run: |
        echo "${{ steps.test_summary.outputs.passed }} out of ${{ steps.test_summary.outputs.total }} tests passed" >> $GITHUB_STEP_SUMMARY
      if: always()
